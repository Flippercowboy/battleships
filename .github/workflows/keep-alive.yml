name: Supabase Keep-Alive

# Runs every 3 days at 08:00 UTC to prevent the free-tier Supabase project
# from pausing due to inactivity (free tier pauses after 7 days).
on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://srwzwckpmywmebvavtqm.supabase.co/rest/v1/game_rooms?limit=1&select=id" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyd3p3Y2twbXl3bWVidmF2dHFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTg3MDcsImV4cCI6MjA5MzIzNDcwN30.V5lNbBRRN18XxUGLlHJ4VARgtUEsGdCyhZwOZqpSSsk" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyd3p3Y2twbXl3bWVidmF2dHFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTg3MDcsImV4cCI6MjA5MzIzNDcwN30.V5lNbBRRN18XxUGLlHJ4VARgtUEsGdCyhZwOZqpSSsk")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase is awake and responding."
          else
            echo "⚠️  Unexpected status $STATUS — check the Supabase dashboard."
            exit 1
          fi
